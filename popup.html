<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Sinequa Doc Search</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <select id="env-select" title="Environnement"></select>
    <div id="status">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Vérification…</span>
    </div>
    <button id="auth-btn" hidden></button>
    <button id="options-btn" class="icon-btn" title="Gérer les environnements">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.2"/>
        <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4"/>
      </svg>
    </button>
  </header>

  <form id="search-form" hidden>
    <div class="searchbox">
      <svg class="lens" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="7" cy="7" r="4.6"/><path d="m10.6 10.6 3.2 3.2"/>
      </svg>
      <input id="search-input" type="search" placeholder="Rechercher dans la documentation…" autocomplete="off" autofocus />
      <button type="submit" id="search-btn" title="Rechercher (Entrée)">↵</button>
    </div>
  </form>

  <div id="message" hidden></div>
  <div id="meta" hidden></div>
  <ul id="results"></ul>

  <footer id="hint">
    <span id="nav-hint" hidden><kbd>↑</kbd><kbd>↓</kbd> naviguer · <kbd>↵</kbd> ouvrir</span>
    <span id="shortcut-hint"></span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
